<!-- Concept 6: Citrus-C — the letter C formed by a halved orange cross-section.
     Rind as the outer arc, flesh + segments visible in the opening, leaf on top.
     Double meaning: C for Credential / Cred, orange for the fruit mark. -->
<svg width="160" height="200" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="80" height="100" fill="#010204"/>

  <!-- Stem -->
  <path d="M 40 24 C 39 18 38 13 40 8"
    stroke="rgba(235,225,205,0.55)" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- Leaf -->
  <path d="M 40 8 C 33 3 50 -1 52 7 C 46 7 42 9 40 8"
    fill="rgba(235,225,205,0.40)"/>

  <!-- ── Orange flesh (the visible cut face inside the C opening) ── -->
  <!-- Sector from center out to the C tips, gives the citrus-slice look -->
  <path d="M 42 60 L 58 38 L 58 82 Z" fill="rgba(235,69,17,0.55)"/>

  <!-- Segment lines radiating outward through the opening -->
  <line x1="42" y1="60" x2="58" y2="38" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="57" y2="43" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="57" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="57" y2="60" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="57" y2="70" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="57" y2="77" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="42" y1="60" x2="58" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Pith (centre of the orange) -->
  <circle cx="42" cy="60" r="4.5" fill="rgba(235,225,205,0.22)"/>
  <circle cx="42" cy="60" r="2"   fill="rgba(235,225,205,0.35)"/>

  <!-- ── The C arc itself (the rind) — drawn on top ── -->
  <!-- Centre (42,60), R=26. Arc from (58,38) CCW large-arc to (58,82) -->
  <path d="M 58 38 A 26 26 0 1 0 58 82"
    stroke="#eb4511" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Rind inner shadow — thin darker line tracing the inner edge -->
  <path d="M 58 38 A 26 26 0 1 0 58 82"
    stroke="rgba(140,30,5,0.45)" stroke-width="0.9" stroke-linecap="round" fill="none"
    style="stroke-dasharray: none; paint-order: stroke"/>
</svg>
