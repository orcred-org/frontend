<!-- Concept 8: Heraldic Crest — a shield outline with a chevron inside and orange focal point.
     Coats of arms, bar associations, military insignia all use shields for authority.
     Minimal / geometric interpretation — not ornate, but unmistakably official. -->
<svg width="160" height="180" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="80" height="90" fill="#010204"/>

  <!-- Shield outline -->
  <!-- Top flat, sides taper to a point at bottom -->
  <path d="M 18 18 L 62 18 L 62 52 Q 40 76 18 52 Z"
    stroke="rgba(235,225,205,0.28)" stroke-width="1" fill="none"/>

  <!-- Inner shield — slightly inset -->
  <path d="M 23 22 L 57 22 L 57 50 Q 40 70 23 50 Z"
    stroke="rgba(235,225,205,0.14)" stroke-width="0.7" fill="none"/>

  <!-- Chevron (inverted V) — authority mark inside shield -->
  <polyline points="24,48 40,30 56,48"
    stroke="rgba(235,225,205,0.30)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Orange point — at chevron apex -->
  <circle cx="40" cy="30" r="3.2" fill="#eb4511"/>

  <!-- Horizontal rule across the shield (divides in thirds — blazon tradition) -->
  <line x1="20" y1="38" x2="60" y2="38" stroke="rgba(235,225,205,0.13)" stroke-width="0.7"/>

  <!-- Small label below shield -->
  <text x="40" y="84"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="5"
    letter-spacing="3.5"
    fill="rgba(235,225,205,0.35)"
    font-weight="400">
    ORCRED
  </text>
</svg>
