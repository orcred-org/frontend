<!-- Concept 17: Orange C slice — filled semicircle oriented as C (opening right),
     leaf floating above. Like a halved orange turned on its side. -->
<svg width="160" height="200" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="80" height="100" fill="#010204"/>

  <!-- Leaf — floating above the C, no connecting line -->
  <path d="M 46 28 C 32 24 30 10 42 7 C 56 4 58 22 46 28 Z" fill="#eb4511"/>
  <!-- Centre vein -->
  <line x1="43" y1="8" x2="46" y2="27" stroke="rgba(120,25,5,0.45)" stroke-width="0.9"/>

  <!-- C shape — filled semicircle, flat edge on right, arc opens left -->
  <!-- Centre (50, 62), R=28. Top (50,34) → arc left through (22,62) → Bottom (50,90) -->
  <path d="M 50 34 A 28 28 0 0 0 50 90 Z" fill="#eb4511"/>
</svg>
